<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DNS解決からTCPハンドシェイク・TLSネゴシエーション・HTTPまで、接続の裏側をステップ実行で眺めるシーケンスビューア"
    />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <title>wirewalk — 接続の裏側を歩く</title>
    <script>
      // 描画前にテーマを解決し、初回フラッシュ(FOUC)を防ぐ。
      // 保存値は設定(自動/ライト/ダーク)で、data-themeには解決済みの明暗を入れる。
      (function () {
        try {
          var pref = localStorage.getItem('wirewalk:theme');
          if (pref !== 'light' && pref !== 'dark' && pref !== 'system') pref = 'system';
          var dark =
            pref === 'dark' ||
            (pref === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
